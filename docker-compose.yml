services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - f1_cache:/app/.f1_cache
      - ./trained_model.pkl:/app/trained_model.pkl
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    build:
      context: ./f1-dashboard
      dockerfile: Dockerfile.frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  f1_cache:
